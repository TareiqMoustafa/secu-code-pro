<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Link Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 95%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .safe {
            background: #064e3b;
        }

        .danger {
            background: #7f1d1d;
        }

        .medium {
            background: #78350f;
        }

        ul {
            text-align: left;
            padding-left: 20px;
        }

        .loader {
            display: none;
            margin-top: 15px;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>🔐 Secure Link Scanner</h1>

    <input type="text" id="urlInput" placeholder="Enter URL here...">

    <button onclick="scanUrl()">Scan Link</button>

    <div class="loader" id="loader">Scanning...</div>

    <div class="result" id="resultBox">
        <h3 id="statusText"></h3>
        <p><strong>Risk Score:</strong> <span id="riskScore"></span>%</p>
        <p><strong>Confidence:</strong> <span id="confidence"></span></p>

        <div id="reasonsContainer">
            <strong>Reasons:</strong>
            <ul id="reasonsList"></ul>
        </div>
    </div>
</div>

<script>
    async function scanUrl() {

        const url = document.getElementById("urlInput").value;
        const resultBox = document.getElementById("resultBox");
        const loader = document.getElementById("loader");

        if (!url) {
            alert("Please enter a URL");
            return;
        }

        resultBox.style.display = "none";
        loader.style.display = "block";

        try {
            const response = await fetch("/analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ link: url })
            });

            const data = await response.json();

            loader.style.display = "none";
            resultBox.style.display = "block";

            document.getElementById("riskScore").innerText = data.risk_score;
            document.getElementById("confidence").innerText = data.confidence;

            const statusText = document.getElementById("statusText");
            const reasonsList = document.getElementById("reasonsList");

            reasonsList.innerHTML = "";

            if (data.reasons && data.reasons.length > 0) {
                data.reasons.forEach(reason => {
                    const li = document.createElement("li");
                    li.innerText = reason;
                    reasonsList.appendChild(li);
                });
            } else {
                reasonsList.innerHTML = "<li>No specific threats detected</li>";
            }

            resultBox.className = "result";

            if (data.status === "safe") {
                statusText.innerText = "✅ SAFE LINK";
                resultBox.classList.add("safe");
            } else if (data.status === "danger") {
                statusText.innerText = "🚨 DANGEROUS LINK";
                resultBox.classList.add("danger");
            } else {
                statusText.innerText = "⚠️ SUSPICIOUS LINK";
                resultBox.classList.add("medium");
            }

        } catch (error) {
            loader.style.display = "none";
            alert("Error connecting to server");
        }
    }
</script>

</body>
</html>
